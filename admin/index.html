<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Admin ROPA*</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>
<div class="admin-layout">

  <header class="admin-header">
    <button class="btn-menu" id="btn-menu" style="background:none;border:none;color:#888;font-size:1.2rem;display:none">☰</button>
    <span class="logo">ROPA<span>*</span></span>
    <span class="header-title">Panel administrativo</span>
    <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
  </header>

  <nav class="admin-sidebar" id="sidebar"></nav>

  <main class="admin-main">
    <div class="page-title">Dashboard</div>
    <div class="page-subtitle" id="subtitulo">Cargando...</div>

    <!-- KPIs principales -->
    <div class="kpi-grid">
      <div class="kpi-card black">
        <div class="kpi-label">Ventas del mes</div>
        <div class="kpi-value" id="kpi-ventas">—</div>
        <div class="kpi-sub" id="kpi-ventas-sub">— ventas</div>
      </div>
      <div class="kpi-card cream">
        <div class="kpi-label">Cobrado</div>
        <div class="kpi-value" id="kpi-cobrado">—</div>
        <div class="kpi-sub" id="kpi-cobrado-sub">— pendiente</div>
      </div>
      <div class="kpi-card red">
        <div class="kpi-label">Gastos del mes</div>
        <div class="kpi-value" id="kpi-total">—</div>
        <div class="kpi-sub" id="kpi-pendientes-sub">— pendiente pago</div>
      </div>
      <div class="kpi-card green">
        <div class="kpi-label">Proveedores activos</div>
        <div class="kpi-value" id="kpi-proveedores">—</div>
        <div class="kpi-sub">en el directorio</div>
      </div>
    </div>

    <!-- Dos columnas: ultimas ventas + ultimas compras -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">

      <!-- Ultimas ventas -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Últimas ventas</span>
          <a href="/admin/ventas/nueva.html" class="btn btn-primary btn-sm">+ Nueva</a>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Fecha</th><th>Artículo</th><th>Monto</th><th>Cobro</th></tr>
            </thead>
            <tbody id="tbody-ventas">
              <tr><td colspan="4" style="text-align:center;color:#888;padding:20px">Cargando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Ultimas compras -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Últimas compras</span>
          <a href="/admin/compras/nueva.html" class="btn btn-primary btn-sm">+ Nueva</a>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Fecha</th><th>Descripción</th><th>Monto</th><th>Estado</th></tr>
            </thead>
            <tbody id="tbody-compras">
              <tr><td colspan="4" style="text-align:center;color:#888;padding:20px">Cargando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/admin/js/config.js"></script>
<script src="/admin/js/auth.js"></script>
<script src="/admin/js/nav.js"></script>
<script>
const client = getClient();

async function loadDashboard() {
  const session = await requireAuth();
  if (!session) return;

  renderNav('/admin/index.html');

  // Subtitulo con fecha
  const now = new Date();
  const mes = now.toLocaleString('es-AR', { month: 'long', year: 'numeric' });
  document.getElementById('subtitulo').textContent =
    'Bienvenido — ' + mes.charAt(0).toUpperCase() + mes.slice(1);

  // Rango del mes actual
  const primerDia = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
  const ultimoDia = new Date(now.getFullYear(), now.getMonth() + 1, 0).toISOString().split('T')[0];

  // KPI ventas del mes
  const { data: ventasMes } = await client
    .from('ventas')
    .select('precio_final, estado_cobro')
    .gte('fecha', primerDia)
    .lte('fecha', ultimoDia);

  if (ventasMes) {
    const totalV   = ventasMes.reduce((s, r) => s + Number(r.precio_final), 0);
    const cobrado  = ventasMes.filter(r => r.estado_cobro === 'Cobrado').reduce((s, r) => s + Number(r.precio_final), 0);
    const pendV    = totalV - cobrado;
    document.getElementById('kpi-ventas').textContent     = pesos(totalV);
    document.getElementById('kpi-ventas-sub').textContent = ventasMes.length + ' ventas';
    document.getElementById('kpi-cobrado').textContent    = pesos(cobrado);
    document.getElementById('kpi-cobrado-sub').textContent= pesos(pendV) + ' pendiente';
  }

  // KPI compras del mes
  const { data: comprasMes } = await client
    .from('compras')
    .select('monto_total, estado_pago')
    .gte('fecha', primerDia)
    .lte('fecha', ultimoDia);

  if (comprasMes) {
    const totalC  = comprasMes.reduce((s, r) => s + Number(r.monto_total), 0);
    const pendC   = comprasMes.filter(r => r.estado_pago !== 'Pagado').reduce((s, r) => s + Number(r.monto_total), 0);
    document.getElementById('kpi-total').textContent          = pesos(totalC);
    document.getElementById('kpi-pendientes-sub').textContent = pesos(pendC) + ' pendiente pago';
  }

  // KPI proveedores
  const { count } = await client
    .from('proveedores')
    .select('*', { count: 'exact', head: true })
    .eq('activo', true);
  document.getElementById('kpi-proveedores').textContent = count ?? 0;

  // Ultimas 6 ventas
  const { data: ventas } = await client
    .from('ventas')
    .select('fecha, articulo, precio_final, estado_cobro, id')
    .order('fecha', { ascending: false })
    .limit(6);

  const tbodyV = document.getElementById('tbody-ventas');
  if (!ventas || ventas.length === 0) {
    tbodyV.innerHTML = `<tr><td colspan="4" style="text-align:center;color:#888;padding:20px">
      Sin ventas. <a href="/admin/ventas/nueva.html" style="color:#0d0d0d;font-weight:600">Registrar primera →</a>
    </td></tr>`;
  } else {
    tbodyV.innerHTML = ventas.map(r => `
      <tr style="cursor:pointer" onclick="window.location='/admin/ventas/editar.html?id=${r.id}'">
        <td style="white-space:nowrap">${fechaCorta(r.fecha)}</td>
        <td>${r.articulo}</td>
        <td style="font-weight:600;white-space:nowrap">${pesos(r.precio_final)}</td>
        <td>${badgeCobro(r.estado_cobro)}</td>
      </tr>
    `).join('');
  }

  // Ultimas 6 compras
  const { data: compras } = await client
    .from('compras')
    .select('fecha, descripcion, monto_total, estado_pago, id')
    .order('fecha', { ascending: false })
    .limit(6);

  const tbodyC = document.getElementById('tbody-compras');
  if (!compras || compras.length === 0) {
    tbodyC.innerHTML = `<tr><td colspan="4" style="text-align:center;color:#888;padding:20px">
      Sin compras. <a href="/admin/compras/nueva.html" style="color:#0d0d0d;font-weight:600">Cargar primera →</a>
    </td></tr>`;
  } else {
    tbodyC.innerHTML = compras.map(r => `
      <tr style="cursor:pointer" onclick="window.location='/admin/compras/editar.html?id=${r.id}'">
        <td style="white-space:nowrap">${fechaCorta(r.fecha)}</td>
        <td>${r.descripcion}</td>
        <td style="font-weight:600;white-space:nowrap">${pesos(r.monto_total)}</td>
        <td>${badgeEstado(r.estado_pago)}</td>
      </tr>
    `).join('');
  }
}

function badgeCobro(estado) {
  const map = { 'Cobrado': 'badge-green', 'Pendiente': 'badge-red', 'Cobro parcial': 'badge-orange' };
  return `<span class="badge ${map[estado] || 'badge-gray'}">${estado || '—'}</span>`;
}

loadDashboard();
</script>
</body>
</html>
