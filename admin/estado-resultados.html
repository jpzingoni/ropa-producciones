<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estado de Resultados — Admin ROPA*</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/admin.css">
  <style>
    .er-wrap { overflow-x: auto; border: 1px solid #e8e0d8; border-radius: 6px; }

    .er-table {
      border-collapse: collapse;
      width: 100%;
      min-width: 860px;
      font-size: .82rem;
    }

    .er-table th, .er-table td {
      padding: 8px 14px;
      text-align: right;
      white-space: nowrap;
      border-bottom: 1px solid #f0ebe3;
    }

    /* Primera columna fija */
    .er-table th:first-child,
    .er-table td:first-child {
      text-align: left;
      position: sticky;
      left: 0;
      z-index: 2;
      min-width: 200px;
    }

    /* Encabezado de tabla */
    .er-table thead th {
      background: #111;
      color: #fff;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .5px;
      text-transform: uppercase;
      border-bottom: none;
      position: sticky;
      top: 0;
      z-index: 3;
    }
    .er-table thead th:first-child { z-index: 4; }

    /* Columna total */
    .col-total {
      background: #f5f2ee !important;
      font-weight: 700 !important;
      border-left: 2px solid #d4c9b8 !important;
    }

    /* Fila de sección (INGRESOS, COSTO, etc.) */
    .fila-seccion td {
      background: #2a2a2a;
      color: #fff;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .6px;
      text-transform: uppercase;
      padding-top: 10px;
      padding-bottom: 10px;
    }
    .fila-seccion td:first-child { background: #2a2a2a; }

    /* Filas de detalle */
    .fila-detalle td { background: #fff; color: #444; }
    .fila-detalle td:first-child { background: #fff; padding-left: 28px; }
    .fila-detalle:hover td { background: #fafaf8; }
    .fila-detalle:hover td:first-child { background: #fafaf8; }

    /* Subtotales intermedios */
    .fila-subtotal td {
      background: #f0ece6;
      font-weight: 700;
      color: #111;
      border-top: 1px solid #d4c9b8;
      border-bottom: 1px solid #d4c9b8;
    }
    .fila-subtotal td:first-child { background: #f0ece6; }

    /* Resultados finales */
    .fila-resultado td {
      font-weight: 700;
      font-size: .86rem;
      border-top: 2px solid #111;
    }
    .fila-resultado.positivo td { background: #edf7ee; color: #1a5c1e; }
    .fila-resultado.negativo td { background: #fdecea; color: #b71c1c; }
    .fila-resultado.neutro   td { background: #f5f2ee; color: #555; }
    .fila-resultado td:first-child { background: inherit; }

    /* Valores */
    .val-neg  { color: #c62828; }
    .val-cero { color: #ccc; }
  </style>
</head>
<body>
<div class="admin-layout">

  <header class="admin-header">
    <button class="btn-menu" id="btn-menu" style="background:none;border:none;color:#888;font-size:1.2rem;display:none">☰</button>
    <span class="logo">ROPA<span>*</span></span>
    <span class="header-title">Panel administrativo</span>
    <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
  </header>

  <nav class="admin-sidebar" id="sidebar"></nav>

  <main class="admin-main">

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px">
      <div>
        <div class="page-title">Estado de Resultados</div>
        <div class="page-subtitle">Ingresos, costos y resultado — por mes</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <label class="form-label" style="margin:0">Año</label>
        <select class="form-control" id="f-ano" style="width:100px" onchange="cargarER()"></select>
        <button class="btn btn-secondary btn-sm" onclick="exportarCSV()">⬇ CSV</button>
      </div>
    </div>

    <div class="panel" style="padding:0">
      <div class="er-wrap">
        <table class="er-table" id="er-table">
          <thead id="er-thead"></thead>
          <tbody id="er-tbody">
            <tr><td colspan="14" style="text-align:center;padding:36px;color:#aaa">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/admin/js/config.js"></script>
<script src="/admin/js/auth.js"></script>
<script src="/admin/js/nav.js"></script>
<script>
const client = getClient();

const MESES_LABEL = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

// Mapeo categoria_pl → campo interno
const CAT_MAP = {
  'Materiales':            'materiales',
  'Estampado e impresion': 'estampado',
  'Confeccion':            'confeccion',
  'Packaging':             'packaging',
  'Marketing y contenido': 'marketing',
  'Logistica y envios':    'logistica',
  'Digital':               'digital',
  'Gastos varios':         'gastos_varios',
};

// Definicion de filas
const FILAS = [
  { tipo: 'seccion',   label: 'Ingresos' },
  { tipo: 'detalle',   label: 'Ventas brutas',           campo: 'ventas_brutas' },
  { tipo: 'detalle',   label: '− Descuentos',            campo: 'descuentos',    neg: true },
  { tipo: 'subtotal',  label: 'Ventas netas',            campo: 'ventas_netas' },

  { tipo: 'seccion',   label: 'Costo de ventas' },
  { tipo: 'detalle',   label: '− Materiales',            campo: 'materiales',    neg: true },
  { tipo: 'detalle',   label: '− Confección',            campo: 'confeccion',    neg: true },
  { tipo: 'detalle',   label: '− Estampado e impresión', campo: 'estampado',     neg: true },
  { tipo: 'resultado', label: 'Ganancia bruta',          campo: 'ganancia_bruta' },

  { tipo: 'seccion',   label: 'Gastos operativos' },
  { tipo: 'detalle',   label: '− Packaging',             campo: 'packaging',     neg: true },
  { tipo: 'detalle',   label: '− Marketing y contenido', campo: 'marketing',     neg: true },
  { tipo: 'detalle',   label: '− Logística y envíos',    campo: 'logistica',     neg: true },
  { tipo: 'detalle',   label: '− Digital',               campo: 'digital',       neg: true },
  { tipo: 'detalle',   label: '− Gastos varios',         campo: 'gastos_varios', neg: true },
  { tipo: 'resultado', label: 'Resultado neto',          campo: 'resultado_neto' },
];

let _erData = null;

async function init() {
  const session = await requireAuth();
  if (!session) return;
  renderNav('/admin/estado-resultados.html');

  const sel = document.getElementById('f-ano');
  const hoy = new Date().getFullYear();
  for (let a = hoy + 1; a >= 2024; a--) {
    const opt = document.createElement('option');
    opt.value = a; opt.textContent = a;
    if (a === hoy) opt.selected = true;
    sel.appendChild(opt);
  }

  await cargarER();
}

async function cargarER() {
  const ano = parseInt(document.getElementById('f-ano').value);

  const campos_cero = {
    ventas_brutas: 0, descuentos: 0, ventas_netas: 0,
    materiales: 0, confeccion: 0, estampado: 0,
    packaging: 0, marketing: 0, logistica: 0, digital: 0, gastos_varios: 0,
  };

  const data = {};
  for (let m = 1; m <= 12; m++) data[m] = { ...campos_cero };

  const [resV, resC] = await Promise.all([
    client.from('ventas').select('fecha,precio_venta,descuento,precio_final')
      .gte('fecha', `${ano}-01-01`).lte('fecha', `${ano}-12-31`),
    client.from('compras').select('fecha,categoria_pl,monto_total')
      .gte('fecha', `${ano}-01-01`).lte('fecha', `${ano}-12-31`),
  ]);

  (resV.data || []).forEach(v => {
    const m = parseInt(v.fecha.split('-')[1]);
    data[m].ventas_brutas += Number(v.precio_venta) || 0;
    data[m].descuentos    += Number(v.descuento)    || 0;
    data[m].ventas_netas  += Number(v.precio_final) || 0;
  });

  (resC.data || []).forEach(c => {
    const m = parseInt(c.fecha.split('-')[1]);
    const campo = CAT_MAP[c.categoria_pl];
    if (campo) data[m][campo] += Number(c.monto_total) || 0;
  });

  for (let m = 1; m <= 12; m++) {
    const d = data[m];
    d.ganancia_bruta = d.ventas_netas - (d.materiales + d.confeccion + d.estampado);
    d.resultado_neto = d.ganancia_bruta - (d.packaging + d.marketing + d.logistica + d.digital + d.gastos_varios);
  }

  // Totales anuales
  const total = { ...campos_cero };
  Object.keys(total).forEach(c => {
    total[c] = Object.values(data).reduce((s, m) => s + (m[c] || 0), 0);
  });
  total.ganancia_bruta = total.ventas_netas - (total.materiales + total.confeccion + total.estampado);
  total.resultado_neto = total.ganancia_bruta - (total.packaging + total.marketing + total.logistica + total.digital + total.gastos_varios);

  _erData = { data, total, ano };
  renderTabla(data, total);
}

function renderTabla(data, total) {
  // Encabezado
  document.getElementById('er-thead').innerHTML = `
    <tr>
      <th>Concepto</th>
      ${MESES_LABEL.map(m => `<th>${m}</th>`).join('')}
      <th class="col-total">Total</th>
    </tr>`;

  const tbody = document.getElementById('er-tbody');
  tbody.innerHTML = '';

  FILAS.forEach(fila => {
    const tr = document.createElement('tr');
    tr.className = 'fila-' + fila.tipo;

    // Fila de sección (título de bloque)
    if (fila.tipo === 'seccion') {
      tr.innerHTML = `<td colspan="14">${fila.label}</td>`;
      tbody.appendChild(tr);
      return;
    }

    // Fila de resultado (ganancia bruta / resultado neto)
    if (fila.tipo === 'resultado') {
      const vt = total[fila.campo] || 0;
      tr.classList.add(vt > 0 ? 'positivo' : vt < 0 ? 'negativo' : 'neutro');
      tr.innerHTML = `
        <td>${fila.label}</td>
        ${Array.from({length:12}, (_, i) => {
          const v = data[i+1][fila.campo] || 0;
          const color = v > 0 ? '#1a5c1e' : v < 0 ? '#b71c1c' : '#ccc';
          return `<td style="color:${color}">${v !== 0 ? pesos(v) : '—'}</td>`;
        }).join('')}
        <td class="col-total" style="color:${vt > 0 ? '#1a5c1e' : vt < 0 ? '#b71c1c' : '#ccc'}">${vt !== 0 ? pesos(vt) : '—'}</td>`;
      tbody.appendChild(tr);
      return;
    }

    // Detalle y subtotal
    const vt = total[fila.campo] || 0;
    tr.innerHTML = `
      <td>${fila.label}</td>
      ${Array.from({length:12}, (_, i) => {
        const v = data[i+1][fila.campo] || 0;
        if (v === 0) return `<td class="val-cero">—</td>`;
        return fila.neg
          ? `<td class="val-neg">(${pesos(v)})</td>`
          : `<td>${pesos(v)}</td>`;
      }).join('')}
      <td class="col-total">${vt !== 0
        ? (fila.neg ? `<span class="val-neg">(${pesos(vt)})</span>` : pesos(vt))
        : '<span class="val-cero">—</span>'}</td>`;
    tbody.appendChild(tr);
  });
}

function exportarCSV() {
  if (!_erData) return;
  const { data, total, ano } = _erData;
  const rows = [['Concepto', ...MESES_LABEL, 'Total'].join(',')];

  FILAS.forEach(f => {
    if (f.tipo === 'seccion') {
      rows.push(`"${f.label}",${Array(13).fill('').join(',')}`);
      return;
    }
    const vals = Array.from({length:12}, (_, i) => Math.round(data[i+1][f.campo] || 0));
    rows.push([`"${f.label}"`, ...vals, Math.round(total[f.campo] || 0)].join(','));
  });

  const blob = new Blob([rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `ROPA_ER_${ano}.csv`;
  a.click();
}

init();
</script>
</body>
</html>
