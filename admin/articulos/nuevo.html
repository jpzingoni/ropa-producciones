<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuevo artículo — Admin ROPA*</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>
<div class="admin-layout">

  <header class="admin-header">
    <button class="btn-menu" id="btn-menu" style="background:none;border:none;color:#888;font-size:1.2rem;display:none">☰</button>
    <span class="logo">ROPA<span>*</span></span>
    <span class="header-title">Panel administrativo</span>
    <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
  </header>

  <nav class="admin-sidebar" id="sidebar"></nav>

  <main class="admin-main">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:4px">
      <a href="/admin/articulos/index.html" class="btn btn-secondary btn-sm">← Volver</a>
      <div>
        <div class="page-title">Nuevo artículo</div>
        <div class="page-subtitle">Agregá un producto al catálogo</div>
      </div>
    </div>

    <form id="form-art">
      <div class="panel">
        <div class="panel-header"><span class="panel-title">Datos del artículo</span></div>
        <div class="panel-body">
          <div class="form-grid">

            <div class="form-group">
              <label class="form-label" for="codigo">Código</label>
              <input class="form-control" type="text" id="codigo"
                     placeholder="Ej: RIO-001, BOL-002">
              <span style="font-size:.72rem;color:#888;margin-top:2px">
                Identificador interno. Se genera automático si lo dejás vacío.
              </span>
            </div>

            <div class="form-group">
              <label class="form-label" for="tipo">Tipo <span class="req">*</span></label>
              <select class="form-control" id="tipo" required>
                <option value="">— Seleccioná —</option>
              </select>
            </div>

            <div class="form-group full">
              <label class="form-label" for="nombre">Nombre <span class="req">*</span></label>
              <input class="form-control" type="text" id="nombre" required
                     placeholder="Ej: Remera RÍO MANSO, Top EL BOLSÓN">
            </div>

            <div class="form-group">
              <label class="form-label" for="talle">Talle <span class="req">*</span></label>
              <select class="form-control" id="talle" required>
                <option value="">— Seleccioná —</option>
              </select>
            </div>

            <div class="form-group full">
              <label class="form-label" for="descripcion">Descripción</label>
              <input class="form-control" type="text" id="descripcion"
                     placeholder="Ej: Remera algodón con print Paraíso, varios colores">
            </div>

          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header"><span class="panel-title">Precios de referencia</span></div>
        <div class="panel-body">
          <div class="form-grid">

            <div class="form-group">
              <label class="form-label" for="precio_venta">Precio de venta ($)</label>
              <input class="form-control" type="number" id="precio_venta"
                     min="0" step="0.01" placeholder="10000">
              <span style="font-size:.72rem;color:#888;margin-top:2px">
                Se autocompleta al elegir el artículo en ventas
              </span>
            </div>

            <div class="form-group">
              <label class="form-label" for="precio_costo">Precio de costo ($)</label>
              <input class="form-control" type="number" id="precio_costo"
                     min="0" step="0.01" placeholder="4500">
              <span style="font-size:.72rem;color:#888;margin-top:2px">
                Referencia para calcular margen
              </span>
            </div>

          </div>
        </div>
      </div>

      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:4px">
        <a href="/admin/articulos/index.html" class="btn btn-secondary">Cancelar</a>
        <button type="submit" class="btn btn-primary" id="btn-guardar" data-write>
          💾 Guardar artículo
        </button>
      </div>
    </form>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/admin/js/config.js"></script>
<script src="/admin/js/auth.js"></script>
<script src="/admin/js/nav.js"></script>
<script>
const client = getClient();

async function init() {
  const session = await requireAuth();
  if (!session) return;
  renderNav('/admin/articulos/index.html');

  const selTipo = document.getElementById('tipo');
  TIPOS_PRENDA.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t; opt.textContent = t;
    selTipo.appendChild(opt);
  });

  const selTalle = document.getElementById('talle');
  TALLES.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t; opt.textContent = t;
    selTalle.appendChild(opt);
  });
}

document.getElementById('form-art').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btn-guardar');
  btn.disabled = true; btn.textContent = 'Guardando...';

  try {
    const nombre = document.getElementById('nombre').value.trim();
    let codigo = document.getElementById('codigo').value.trim();

    // Auto-generar codigo si esta vacio
    if (!codigo) {
      const prefijo = nombre.substring(0, 3).toUpperCase().replace(/\s/g, '');
      const rand    = Math.floor(Math.random() * 900 + 100);
      codigo = `${prefijo}-${rand}`;
    }

    const payload = {
      codigo,
      nombre,
      tipo:         document.getElementById('tipo').value || null,
      talle:        document.getElementById('talle').value || null,
      descripcion:  document.getElementById('descripcion').value.trim() || null,
      precio_venta: parseFloat(document.getElementById('precio_venta').value) || null,
      precio_costo: parseFloat(document.getElementById('precio_costo').value) || null,
      activo:       true,
    };

    const { error } = await client.from('articulos').insert(payload);
    if (error) throw error;

    sessionStorage.setItem('toast', 'Artículo guardado correctamente');
    window.location.href = '/admin/articulos/index.html';
  } catch (err) {
    showAlert('Error al guardar: ' + err.message);
    btn.disabled = false;
    btn.textContent = '💾 Guardar artículo';
  }
});

init();
</script>
</body>
</html>
