<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar artículo — Admin ROPA*</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>
<div class="admin-layout">

  <header class="admin-header">
    <button class="btn-menu" id="btn-menu" style="background:none;border:none;color:#888;font-size:1.2rem;display:none">☰</button>
    <span class="logo">ROPA<span>*</span></span>
    <span class="header-title">Panel administrativo</span>
    <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
  </header>

  <nav class="admin-sidebar" id="sidebar"></nav>

  <main class="admin-main">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:4px">
      <a href="/admin/articulos/index.html" class="btn btn-secondary btn-sm">← Volver</a>
      <div>
        <div class="page-title">Editar artículo</div>
        <div class="page-subtitle" id="subtitulo">Cargando...</div>
      </div>
    </div>

    <form id="form-art" style="opacity:0;transition:opacity .2s">
      <div class="panel">
        <div class="panel-header"><span class="panel-title">Datos del artículo</span></div>
        <div class="panel-body">
          <div class="form-grid">

            <div class="form-group">
              <label class="form-label" for="codigo">Código</label>
              <input class="form-control" type="text" id="codigo">
            </div>

            <div class="form-group">
              <label class="form-label" for="tipo">Tipo <span class="req">*</span></label>
              <select class="form-control" id="tipo" required>
                <option value="">— Seleccioná —</option>
              </select>
            </div>

            <div class="form-group full">
              <label class="form-label" for="nombre">Nombre <span class="req">*</span></label>
              <input class="form-control" type="text" id="nombre" required>
            </div>

            <div class="form-group">
              <label class="form-label" for="talle">Talle</label>
              <select class="form-control" id="talle">
                <option value="">— Sin talle —</option>
              </select>
            </div>

            <div class="form-group full">
              <label class="form-label" for="descripcion">Descripción</label>
              <input class="form-control" type="text" id="descripcion">
            </div>

          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header"><span class="panel-title">Precios de referencia</span></div>
        <div class="panel-body">
          <div class="form-grid">

            <div class="form-group">
              <label class="form-label" for="precio_venta">Precio de venta ($)</label>
              <input class="form-control" type="number" id="precio_venta" min="0" step="0.01">
            </div>

            <div class="form-group">
              <label class="form-label" for="precio_costo">Precio de costo ($)</label>
              <input class="form-control" type="number" id="precio_costo" min="0" step="0.01">
            </div>

          </div>
        </div>
      </div>

      <!-- Estado -->
      <div class="panel">
        <div class="panel-header"><span class="panel-title">Estado</span></div>
        <div class="panel-body">
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:.9rem">
            <input type="checkbox" id="activo" style="width:16px;height:16px">
            <span>Artículo activo (aparece en los selectores de ventas y compras)</span>
          </label>
        </div>
      </div>

      <div style="display:flex;gap:10px;justify-content:space-between;margin-top:4px">
        <button type="button" class="btn btn-danger" id="btn-eliminar">
          🗑 Eliminar artículo
        </button>
        <div style="display:flex;gap:10px">
          <a href="/admin/articulos/index.html" class="btn btn-secondary">Cancelar</a>
          <button type="submit" class="btn btn-primary" id="btn-guardar" data-write>
            💾 Guardar cambios
          </button>
        </div>
      </div>
    </form>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/admin/js/config.js"></script>
<script src="/admin/js/auth.js"></script>
<script src="/admin/js/nav.js"></script>
<script>
const client = getClient();
const id = new URLSearchParams(window.location.search).get('id');

async function init() {
  const session = await requireAuth();
  if (!session) return;
  renderNav('/admin/articulos/index.html');

  if (!id) { window.location.href = '/admin/articulos/index.html'; return; }

  const selTipo = document.getElementById('tipo');
  TIPOS_PRENDA.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t; opt.textContent = t;
    selTipo.appendChild(opt);
  });

  const selTalle = document.getElementById('talle');
  TALLES.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t; opt.textContent = t;
    selTalle.appendChild(opt);
  });

  const { data, error } = await client.from('articulos').select('*').eq('id', id).single();
  if (error || !data) { showAlert('Artículo no encontrado'); return; }

  document.getElementById('subtitulo').textContent = data.nombre;
  document.getElementById('codigo').value        = data.codigo || '';
  document.getElementById('nombre').value        = data.nombre || '';
  document.getElementById('tipo').value          = data.tipo || '';
  document.getElementById('talle').value         = data.talle || '';
  document.getElementById('descripcion').value   = data.descripcion || '';
  document.getElementById('precio_venta').value  = data.precio_venta || '';
  document.getElementById('precio_costo').value  = data.precio_costo || '';
  document.getElementById('activo').checked      = data.activo !== false;

  document.getElementById('form-art').style.opacity = '1';
}

document.getElementById('form-art').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btn-guardar');
  btn.disabled = true; btn.textContent = 'Guardando...';

  try {
    const payload = {
      codigo:       document.getElementById('codigo').value.trim() || null,
      nombre:       document.getElementById('nombre').value.trim(),
      tipo:         document.getElementById('tipo').value || null,
      talle:        document.getElementById('talle').value || null,
      descripcion:  document.getElementById('descripcion').value.trim() || null,
      precio_venta: parseFloat(document.getElementById('precio_venta').value) || null,
      precio_costo: parseFloat(document.getElementById('precio_costo').value) || null,
      activo:       document.getElementById('activo').checked,
      updated_at:   new Date().toISOString(),
    };

    const { error } = await client.from('articulos').update(payload).eq('id', id);
    if (error) throw error;

    sessionStorage.setItem('toast', 'Artículo actualizado correctamente');
    window.location.href = '/admin/articulos/index.html';
  } catch (err) {
    showAlert('Error al guardar: ' + err.message);
    btn.disabled = false;
    btn.textContent = '💾 Guardar cambios';
  }
});

document.getElementById('btn-eliminar').addEventListener('click', async () => {
  if (!confirm('¿Eliminar este artículo? Esta acción no se puede deshacer.')) return;
  const { error } = await client.from('articulos').delete().eq('id', id);
  if (error) { showAlert('Error al eliminar: ' + error.message); return; }
  sessionStorage.setItem('toast', 'Artículo eliminado');
  window.location.href = '/admin/articulos/index.html';
});

init();
</script>
</body>
</html>
